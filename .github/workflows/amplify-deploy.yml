name: Deploy to AWS Amplify

on:
  push:
    branches:
      - main
      - develop

env:
  AWS_REGION: us-east-1
  NODE_VERSION: '20'

permissions:
  id-token: write
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Write AWS credentials file for Amplify CLI
        run: |
          mkdir -p ~/.aws
          cat > ~/.aws/credentials <<CREDS
          [default]
          aws_access_key_id=$AWS_ACCESS_KEY_ID
          aws_secret_access_key=$AWS_SECRET_ACCESS_KEY
          aws_session_token=$AWS_SESSION_TOKEN
          CREDS
          cat > ~/.aws/config <<CONFIG
          [default]
          region=$AWS_REGION
          CONFIG

      - name: Deploy to AWS Amplify
        env:
          AMPLIFY_APP_ID: d1sh153wstyrpi
          AMPLIFY_ENVIRONMENT: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
        run: |
          set -o pipefail
          npm install -g @aws-amplify/cli
          amplify pull --appId $AMPLIFY_APP_ID --envName $AMPLIFY_ENVIRONMENT --yes
          # `amplify pull` resets backend-config.json and category folders to whatever
          # this environment has previously had pushed to the cloud, silently dropping
          # any category that was only ever added locally/in git but never pushed for
          # this specific environment. Restore the committed desired state before
          # publish computes its diff, so newly added categories actually get deployed.
          git checkout -- amplify/backend/backend-config.json amplify/backend/auth amplify/backend/api
          amplify publish --yes 2>&1 | tee /tmp/amplify-publish.log
          ! grep -q '🛑' /tmp/amplify-publish.log

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-artifacts-${{ github.ref_name }}
          path: dist/
          retention-days: 5

      - name: Notify deployment status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}';
            const environment = '${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}';
            const emoji = status === 'success' ? '✅' : '❌';
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: `${emoji} Deployment to ${environment} ${status}`
            });
