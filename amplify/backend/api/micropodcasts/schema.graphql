type PodcastSubscription @model @auth(rules: [{ allow: owner }]) {
  id: ID!
  feedUrl: String!
  trackName: String
  artistName: String
  collectionName: String
  artworkUrl100: String
  artworkUrl600: String
  primaryGenreName: String
  trackCount: Int
}

type TrackProgress @model @auth(rules: [{ allow: owner }]) {
  id: ID! # the episode guid
  progress: Float!
  podcastFeedUrl: String!
}
